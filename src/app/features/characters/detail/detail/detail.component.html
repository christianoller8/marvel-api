

<div class="background-blur"></div> <!-- Fondo desenfocado -->
<div class="login-container">
  <div class="container">
    <h1 class="title">{{ serie.title | uppercase }}</h1>
    <div class="content">
      <div class="left">
        <img
          class="image"
          src="{{ serie.thumbnail.path + '.' + serie.thumbnail.extension }}"
          alt="{{ serie.title }} thumbnail"
        />
      </div>
      <div class="right">
        <table mat-table [dataSource]="[serie]" class="mat-elevation-z8">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let element">{{ element.id }}</td>
          </ng-container>
  
          <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let element">{{ element.title }}</td>
          </ng-container>
  
          <ng-container matColumnDef="modified">
            <th mat-header-cell *matHeaderCellDef>Date</th>
            <td mat-cell *matCellDef="let element">
              {{ element.modified | date:'medium' }}
            </td>
          </ng-container>
  
          <tr mat-header-row *matHeaderRowDef="['id', 'title', 'modified']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['id', 'title', 'modified']"></tr>
        </table>
      </div>
    </div>
  </div>
  <div>
    
  </div>
</div>
